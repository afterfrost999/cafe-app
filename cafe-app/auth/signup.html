<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>회원가입 | Chimchar Cafe</title>
    <link rel="stylesheet" href="../css/variables.css" />
    <link rel="stylesheet" href="auth.css" />
  </head>
  <body data-auth-mode="signup">
    <header class="site-header">
      <div class="container header-inner">
        <a href="../index.html" class="logo">Chimchar Cafe <span class="pixel-flame" aria-hidden="true"></span></a>
        <nav class="nav" data-auth-nav></nav>
      </div>
    </header>

    <button class="back-btn" type="button" onclick="history.back()">← 돌아가기</button>

    <main class="auth-page">
      <section class="auth-card" aria-labelledby="auth-title">
        <p class="auth-eyebrow">JOIN THE CAFE</p>
        <h1 id="auth-title">회원가입</h1>
        <p class="auth-desc">이름과 계정을 등록하고 카페를 시작해보세요.</p>

        <form class="auth-form" id="auth-form">
          <label>
            <span>이름</span>
            <input name="name" autocomplete="name" required />
          </label>
          <label>
            <span>이메일</span>
            <input type="email" name="email" autocomplete="email" required />
          </label>
          <label>
            <span>아이디</span>
            <input name="username" autocomplete="username" required />
          </label>
          <label>
            <span>비밀번호</span>
            <input type="password" name="password" autocomplete="new-password" minlength="4" required />
          </label>
          <label>
            <span>비밀번호 확인</span>
            <input type="password" name="passwordConfirm" autocomplete="new-password" minlength="4" required />
          </label>
          <p class="auth-error" id="auth-error" role="alert"></p>
          <button class="auth-submit" type="submit">회원가입</button>
        </form>

        <p class="auth-switch">이미 계정이 있나요? <a href="login.html">로그인</a></p>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>    <script src="../js/supabase.js"></script>    <script src="../js/utils.js"></script>
    <script src="../js/pixelart.js"></script>
    <script src="auth.js"></script>
  </body>
</html>
