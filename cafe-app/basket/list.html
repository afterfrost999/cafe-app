<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>장바구니 | chimchar cafe</title>
    <link rel="stylesheet" href="../css/variables.css" />
    <link rel="stylesheet" href="list.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a href="../index.html" class="logo">Chimchar Cafe <span class="pixel-flame" aria-hidden="true"></span></a>
        <nav class="nav" data-auth-nav></nav>
      </div>
    </header>

    <button class="back-btn" type="button" onclick="history.back()">← 돌아가기</button>

    <main class="container page">
      <section class="page-head">
        <h1>장바구니</h1>
        <p class="text-muted">담은 메뉴를 확인하고 주문하세요</p>
      </section>

      <div class="basket-layout">
        <!-- 장바구니 항목 -->
        <ul class="cart-list" id="cart-list"></ul>

        <!-- 결제 요약 -->
        <aside class="summary glass-card" id="summary">
          <h2 class="summary-title">주문 요약</h2>
          <dl class="summary-row">
            <dt>총 수량</dt>
            <dd id="summary-count">0개</dd>
          </dl>
          <dl class="summary-row">
            <dt>총 상품금액</dt>
            <dd id="summary-total">0원</dd>
          </dl>
          <div class="coupon-picker">
            <label for="coupon-select">보유 중인 쿠폰</label>
            <select id="coupon-select">
              <option value="">쿠폰 적용 안 함</option>
            </select>
            <p id="coupon-help">쿠폰을 선택하면 할인 금액이 반영돼요.</p>
          </div>
          <dl class="summary-row summary-discount">
            <dt>쿠폰 할인</dt>
            <dd id="summary-discount">-0원</dd>
          </dl>
          <div class="summary-divider"></div>
          <dl class="summary-row summary-final">
            <dt>결제 예정금액</dt>
            <dd id="summary-final">0원</dd>
          </dl>
          <div class="checkout-options">
            <fieldset class="fulfillment-options">
              <legend>이용 방법</legend>
              <div class="fulfillment-chips">
                <label class="fulfillment-chip">
                  <input type="radio" name="fulfillment" value="takeout" checked />
                  <span>포장</span>
                </label>
                <label class="fulfillment-chip">
                  <input type="radio" name="fulfillment" value="dine-in" />
                  <span>매장</span>
                </label>
              </div>
            </fieldset>
            <label class="request-field" for="order-request">
              <span>요청사항</span>
              <textarea
                id="order-request"
                maxlength="200"
                rows="3"
                placeholder="예: 빨대는 빼주세요"
              ></textarea>
              <small><span id="request-count">0</span>/200</small>
            </label>
          </div>
          <button class="btn btn-primary summary-order" id="btn-order">
            주문하기
          </button>
          <button class="btn btn-outline summary-clear" id="btn-clear">
            장바구니 비우기
          </button>
        </aside>
      </div>

      <!-- 빈 장바구니 -->
      <div class="empty" id="empty" hidden>
        <p>장바구니가 비어 있어요.</p>
        <a href="../menus/list.html" class="btn btn-primary">메뉴 보러 가기</a>
      </div>
    </main>

    <script src="../js/data.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/pixelart.js"></script>
    <script src="list.js"></script>
  </body>
</html>
