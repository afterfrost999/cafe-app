<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>chimchar cafe | 작은 불씨처럼 따뜻한 커피 한 잔</title>
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a href="index.html" class="logo">🔥 chimchar cafe <img class="logo-gif" src="assets/chimchar.gif" alt="Chimchar" /></a>
        <nav class="nav">
          <a href="menus/list.html" class="nav-link">메뉴</a>
          <a href="orders/list.html" class="nav-link">주문내역</a>
          <a href="my/index.html" class="nav-link">마이</a>
          <a href="basket/list.html" class="nav-link cart-link">
            🛒 <span id="cart-count" class="cart-count">0</span>
          </a>
        </nav>
      </div>
    </header>

    <!-- 배경에 떠다니는 원두 파티클 -->
    <div class="bean-field" id="bean-field" aria-hidden="true"></div>

    <main>
      <!-- 히어로 -->
      <section class="hero">
        <div class="container hero-inner">
          <div class="hero-copy">
            <p class="hero-eyebrow">chimchar cafe</p>
            <h1 class="hero-title">작은 불씨처럼<br />따뜻한 커피 한 잔</h1>
            <p class="hero-desc">
              깊게 내린 커피와 부드러운 디저트가<br />
              잠시 쉬어갈 수 있는 포근한 시간을 전해드립니다.
            </p>
            <a href="menus/list.html" class="btn btn-primary hero-cta">
              메뉴 보러 가기 →
            </a>
          </div>

          <!-- 추천 메뉴 사진 슬라이드 -->
          <div class="hero-slider" id="hero-slider">
            <div class="hero-track" id="hero-track"></div>
            <div class="hero-dots" id="hero-dots"></div>
          </div>
        </div>
      </section>

      <!-- 하단 패널 (다른 페이지처럼 밝은 배경) -->
      <div class="lower-panel">
        <!-- 카테고리 바로가기 -->
        <section class="container section">
          <h2 class="section-title section-title--cat">카테고리</h2>
          <ul class="category-grid" id="category-grid"></ul>
        </section>

        <!-- 추천 메뉴 -->
        <section class="container section">
          <div class="section-head">
            <h2 class="section-title">추천 메뉴</h2>
            <a href="menus/list.html" class="section-more">전체 보기 →</a>
          </div>
          <ul class="menu-grid" id="featured-grid"></ul>
        </section>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container">
        <p>☕ 카페 · 매일 07:00 - 22:00</p>
        <p class="text-muted">© 2026 Cafe App. All rights reserved.</p>
      </div>
    </footer>

    <script src="js/data.js"></script>
    <script src="js/utils.js"></script>
    <script src="index.js"></script>
  </body>
</html>
