<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>chimchar cafe | 작은 불씨처럼 따뜻한 커피 한 잔</title>
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a href="index.html" class="logo">🔥 chimchar cafe <img class="logo-gif" src="assets/chimchar.gif" alt="Chimchar" /></a>
        <nav class="nav">
          <a href="menus/list.html" class="nav-link">메뉴</a>
          <a href="orders/list.html" class="nav-link">주문내역</a>
          <a href="my/index.html" class="nav-link">마이</a>
          <a href="basket/list.html" class="nav-link cart-link">
            🛒 <span id="cart-count" class="cart-count">0</span>
          </a>
        </nav>
      </div>
    </header>

    <!-- 픽셀 눈 + 커서 불빛 -->
    <canvas class="snow-canvas" id="snow-canvas" aria-hidden="true"></canvas>
    <div class="cursor-glow" id="cursor-glow" aria-hidden="true"></div>

    <main>
      <!-- 히어로 : 코드로 그린 픽셀아트 벽난로 -->
      <section class="hero">
        <div class="fireplace">
          <canvas class="hearth-canvas" id="hearth-canvas"></canvas>
          <!-- 은은하게 맥동하는 불빛 -->
          <div class="fire-glow"></div>
        </div>

        <!-- 좌측 세로 바로가기 -->
        <nav class="hero-nav" aria-label="바로가기">
          <a class="hero-nav-item" href="menus/list.html"><span>메뉴</span></a>
          <a class="hero-nav-item" href="#" data-soon="이벤트"><span>이벤트</span></a>
          <a class="hero-nav-item" href="#" data-soon="랜덤 메뉴 추천"><span>랜덤 메뉴 추천</span></a>
          <a class="hero-nav-item" href="basket/list.html"><span>장바구니</span></a>
          <a class="hero-nav-item" href="orders/list.html"><span>주문내역</span></a>
          <a class="hero-nav-item" href="my/index.html"><span>마이페이지</span></a>
        </nav>

        <!-- 우측 세로 슬라이더 (빈 메뉴카드 4장 순환) -->
        <div class="hero-side" aria-hidden="true">
          <div class="hero-side-slider" id="hero-side-slider">
            <div class="side-card"></div>
            <div class="side-card"></div>
            <div class="side-card"></div>
            <div class="side-card"></div>
          </div>
        </div>
      </section>

      <!-- 하단 패널 (다른 페이지처럼 밝은 배경) -->
      <div class="lower-panel">
        <!-- 카테고리 바로가기 -->
        <section class="container section">
          <h2 class="section-title section-title--cat">카테고리</h2>
          <ul class="category-grid" id="category-grid"></ul>
        </section>

        <!-- 추천 메뉴 -->
        <section class="container section">
          <div class="section-head">
            <h2 class="section-title">추천 메뉴</h2>
            <a href="menus/list.html" class="section-more">전체 보기 →</a>
          </div>
          <ul class="menu-grid" id="featured-grid"></ul>
        </section>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container">
        <p>☕ 카페 · 매일 07:00 - 22:00</p>
        <p class="text-muted">© 2026 Cafe App. All rights reserved.</p>
      </div>
    </footer>

    <script src="js/data.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/pixelart.js"></script>
    <script src="index.js"></script>
  </body>
</html>
