<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>주문 관리 | chimchar cafe 관리자</title>
    <link rel="stylesheet" href="../../css/variables.css" />
    <link rel="stylesheet" href="list.css" />
  </head>
  <body>
    <header class="admin-header">
      <div class="container header-inner">
        <a href="../index.html" class="logo">Chimchar Cafe 관리자 🔥</a>
        <nav class="nav">
          <a href="../index.html" class="nav-link">대시보드</a>
          <a href="../events/list.html" class="nav-link">이벤트 관리</a>
          <a href="../notices/list.html" class="nav-link">공지사항 관리</a>

          <a href="../../index.html" class="nav-link nav-exit">홈 화면 →</a>
        </nav>
      </div>
    </header>

    <main class="container page">
      <section class="page-head">
        <h1>주문 관리</h1>
        <p class="text-muted">전체 주문을 확인하고 상태를 관리하세요</p>
      </section>

      <!-- 상태 필터 -->
      <div class="filter-tabs" id="filter-tabs"></div>

      <!-- 주문 테이블 -->
      <div class="table-wrap" id="table-wrap">
        <div class="table-scroll">
          <table class="order-table">
            <thead>
              <tr>
                <th>주문번호</th>
                <th>주문일시</th>
                <th>메뉴</th>
                <th class="ta-right">금액</th>
                <th class="ta-center">상태</th>
              </tr>
            </thead>
            <tbody id="order-body"></tbody>
          </table>
        </div>
      </div>

      <p class="empty" id="empty" hidden>해당 상태의 주문이 없어요.</p>
    </main>

    <script src="../../js/data.js"></script>
    <script src="../../js/utils.js"></script>
    <script src="../../js/pixelart.js"></script>
    <script src="list.js"></script>
