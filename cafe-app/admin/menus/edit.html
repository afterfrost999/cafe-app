<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>메뉴 수정 - chimchar cafe 관리자</title>
  <link rel="stylesheet" href="../../css/variables.css" />
  <link rel="stylesheet" href="edit.css" />
</head>
<body>
  <header class="admin-header">
    <div class="container admin-header__inner">
      <h1 class="admin-header__title">☕ 관리자</h1>
      <nav class="admin-header__nav">
        <a href="../index.html" class="admin-header__link">대시보드</a>
        <a href="../events/list.html" class="admin-header__link">이벤트 관리</a>
        <a href="../notices/list.html" class="admin-header__link">공지사항 관리</a>
        <a href="list.html" class="admin-header__link is-active">메뉴 관리</a>
        <a href="../orders/list.html" class="admin-header__link">주문 관리</a>
      </nav>
    </div>
  </header>

  <main class="container admin-main">
    <a href="list.html" class="back-link">← 메뉴 목록</a>
    <h2 class="page-heading__title">메뉴 수정</h2>

    <form id="menuForm" class="menu-form glass-card" hidden>
      <div class="form-field">
        <label for="name">메뉴명</label>
        <input type="text" id="name" name="name" required />
      </div>

      <div class="form-field">
        <label for="categoryId">카테고리</label>
        <select id="categoryId" name="categoryId" required></select>
      </div>

      <div class="form-field">
        <label for="price">가격 (원)</label>
        <input type="number" id="price" name="price" min="0" step="100" required />
      </div>

      <div class="form-field">
        <label for="image">이미지 URL</label>
        <input type="url" id="image" name="image" placeholder="https://..." required />
      </div>

      <div class="form-field">
        <label for="description">설명</label>
        <textarea id="description" name="description" rows="3"></textarea>
      </div>

      <div class="form-field">
        <label for="tags">태그 (쉼표로 구분)</label>
        <input type="text" id="tags" name="tags" placeholder="베스트, HOT/ICE" />
      </div>

      <div class="form-field form-field--checkbox">
        <label>
          <input type="checkbox" id="soldOut" name="soldOut" />
          품절 처리
        </label>
      </div>

      <div class="form-actions">
        <a href="list.html" class="btn btn-outline">취소</a>
        <button type="submit" class="btn btn-primary">저장</button>
      </div>
    </form>
    <p class="menu-form__empty" id="emptyState" hidden>메뉴를 찾을 수 없습니다.</p>
  </main>

  <script src="../../js/data.js"></script>
  <script src="../../js/utils.js"></script>
  <script src="edit.js"></script>
</body>
</html>
