<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>이벤트 수정 - Chimchar Cafe 관리자</title>
    <link rel="stylesheet" href="../../css/variables.css" />
    <link rel="stylesheet" href="../menus/create.css" />
  </head>
  <body>
    <header class="admin-header">
      <div class="container admin-header__inner">
        <h1 class="admin-header__title">관리자</h1>
        <nav class="admin-header__nav">
          <a href="../index.html" class="admin-header__link">대시보드</a>
          <a href="list.html" class="admin-header__link is-active">이벤트 관리</a>
          <a href="../notices/list.html" class="admin-header__link">공지사항 관리</a>
          <a href="../menus/list.html" class="admin-header__link">메뉴 관리</a>
          <a href="../orders/list.html" class="admin-header__link">주문 관리</a>
        </nav>
      </div>
    </header>

    <main class="container admin-main">
      <a href="list.html" class="back-link">← 이벤트 목록</a>
      <h2 class="page-heading__title">이벤트 수정</h2>

      <form id="eventForm" class="menu-form glass-card" hidden>
        <div class="form-field">
          <label for="title">제목</label>
          <input type="text" id="title" name="title" required />
        </div>

        <div class="form-field">
          <label for="kind">종류 (픽셀아트)</label>
          <select id="kind" name="kind" required>
            <option value="fire">불꽃</option>
            <option value="coffee">커피</option>
            <option value="dessert">디저트</option>
          </select>
        </div>

        <div class="form-field">
          <label for="badge">배지</label>
          <input
            type="text"
            id="badge"
            name="badge"
            placeholder="진행 중 / 상시 / 주말 한정"
          />
        </div>

        <div class="form-field">
          <label for="period">기간</label>
          <input
            type="text"
            id="period"
            name="period"
            placeholder="2026.07.01 — 2026.07.31"
          />
        </div>

        <div class="form-field">
          <label for="description">설명</label>
          <textarea id="description" name="description" rows="3"></textarea>
        </div>

        <div class="form-actions">
          <a href="list.html" class="btn btn-outline">취소</a>
          <button type="submit" class="btn btn-primary">저장</button>
        </div>
      </form>
      <p class="menu-form__empty" id="emptyState" hidden>
        이벤트를 찾을 수 없습니다.
      </p>
    </main>

    <script src="../../js/data.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>    <script src="../../js/supabase.js"></script>    <script src="../../js/utils.js"></script>
    <script src="edit.js"></script>
  </body>
</html>
